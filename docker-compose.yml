services:
  # Node.js backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MOCK_DB=false
      - MONGODB_URI=${MONGODB_URI}
    volumes:
      - backend_data:/app/data

  # React frontend served via Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_data:
