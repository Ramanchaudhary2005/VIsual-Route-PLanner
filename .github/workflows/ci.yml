# ───────────────────────────────────────────────────────────────
# CI Pipeline — Visual Route Planner
# Triggers on every push and pull request.
# Runs lint, build, and algorithm tests for both frontend & backend.
# ───────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel redundant runs for the same PR / branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend ────────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        if: matrix.node-version == 22 && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Backend ─────────────────────────────────────────────────
  backend:
    name: Backend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run algorithm tests
        run: node testAlgorithms.js

      - name: Verify server starts
        env:
          MOCK_DB: "true"
        run: |
          # Start the server in the background with mock DB (no MongoDB needed)
          node server.js &
          SERVER_PID=$!

          # Retry health check up to 10 times (1s apart)
          for i in $(seq 1 10); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE — retrying..."
            sleep 1
          done

          # Cleanup and fail
          kill $SERVER_PID 2>/dev/null || true
          echo "::error::Health check failed after 10 attempts"
          exit 1
